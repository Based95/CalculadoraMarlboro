<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora de Marlboros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Introduce el precio en €:</h1>
        <div class="input-container">
            <input type="number" id="campoPrecio" step="0.01" placeholder="0.00" inputmode="decimal">
            <button id="botonCalcular">Calcular</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="panelVisual" width="360" height="500"></canvas>
    </div>

    <div class="footer">
        <h2 id="labelResultado">Equivale a: 0.00 paquetes</h2>
    </div>

    <script src="app.js"></script>
</body>
</html>
